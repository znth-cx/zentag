version: 2

project_name: zentag

before:
  hooks:
    - go mod tidy

builds:
  - id: zentag
    main: ./cmd/cli
    binary: zentag
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/znth-cx/zentag/internal/version.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs(\\(.*\\))?:"
      - "^test(\\(.*\\))?:"
      - "^ci(\\(.*\\))?:"
      - "^chore(\\(.*\\))?:"
      - "^style(\\(.*\\))?:"
      - "^Merge branch"
      - "^Merge pull request"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: znth-cx
    name: zentag
  footer: |
    ## Installation

    {{ .Env.RELEASE_NOTES }}

    **Full changelog**: https://github.com/znth-cx/zentag/compare/{{ .PreviousTag }}...{{ .Tag }}
