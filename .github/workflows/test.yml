name: test

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read

# Cancel superseded runs on same branch; saves private-repo minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Integration tests need these; they self-skip when absent (Windows runner).
      - name: Install ffmpeg and mediainfo
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo

      - name: Install ffmpeg and mediainfo (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg mediainfo

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  # Call-graph-aware CVE scan; complements dependabot alerts.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
