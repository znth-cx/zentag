name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Refuse tags not merged to main.
      - name: Verify tag commit is on main
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::Tag $GITHUB_REF_NAME points to a commit not on main; merge to main first, then tag."
            exit 1
          }

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Pull the dependencies + install sections from README
      - name: Build install notes from README
        run: |
          {
            echo 'RELEASE_NOTES<<GORELEASER_EOF'
            awk '/^## Required dependencies/{f=1} /^## Commands/{f=0} f' README.md
            echo 'GORELEASER_EOF'
          } >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
